[colors]
background = #D4D0C8
background2 = #000080
foreground = #000000
foreground-active = #FFFFFF
disabled = #808080

[bar/main]
width = 100%
height = 24pt
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3pt
border-size = 2pt
border-color = #808080
padding-left = 0
padding-right = 1

module-margin = 1

font-0 = "JetBrainsMono Nerd Font:size=11;2"

modules-left = xworkspaces
modules-center = xwindow
modules-right = network disk battery calendar clock 

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background2}
label-active-foreground = ${colors.foreground-active}
label-active-underline = ${colors.background2}
label-active-padding = 1

label-occupied = %name%
label-occupied-background = ${colors.background}
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.foreground}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 1

label-empty = %name%
label-empty-background = ${colors.background}
label-empty-foreground = ${colors.disabled}

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/network]
type = internal/network
interface-type = wireless
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-connected = ’ć½ 
label-disconnected = ¾░¢¬ 

[module/battery]
type = internal/battery
full-at = 99
low-at = 10
battery = BAT0
adapter = ADP1
poll-interval = 5
time-format = %H:%M

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
label-charging = Charging %percentage%%
label-discharging = Discharging %percentage%%
label-full = Fully charged
label-low = BATTERY LOW
ramp-capacity-0 = ’ēä
ramp-capacity-1 = ’ēā
ramp-capacity-2 = ’ēé
ramp-capacity-3 = ’ēü
ramp-capacity-4 = ’ēĆ
bar-capacity-width = 10
animation-charging-0 = ’ēä
animation-charging-1 = ’ēā
animation-charging-2 = ’ēé
animation-charging-3 = ’ēü
animation-charging-4 = ’ēĆ
animation-charging-framerate = 750
animation-discharging-0 = ’ēĆ
animation-discharging-1 = ’ēü
animation-discharging-2 = ’ēé
animation-discharging-3 = ’ēā
animation-discharging-4 = ’ēä
animation-discharging-framerate = 500
animation-low-0 = !
animation-low-1 = 
animation-low-framerate = 200

[module/disk]
type = internal/fs
mount-0 = /
interval = 30
label-mounted = ¾░ŗŖ %percentage_used%%

[module/calendar]
type = custom/script
exec = python3 ~/scripts-notes/scripts/calendar_daemon.py
tail = true

[module/clock]
type = internal/date
interval = 1
date = ’É║ %H:%M
date-alt = ¾░āŁ %Y-%m-%d
label = %date%
