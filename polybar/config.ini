[colors]
background = #1d2230
background2 = #212736
foreground = #e3e5e5
foreground-active = #a3aed2
disabled = #394260
accent = #769ff0

[bar/main]
width = 100%
height = 24pt
radius = 8

background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3pt
border-size = 4pt
border-color = ${colors.background}
padding-left = 1
padding-right = 2

module-margin = 1

font-0 = "JetBrainsMono Nerd Font:size=11;2"

modules-left = xworkspaces
modules-center = xwindow
modules-right = network disk cpu memory pulseaudio battery clock 

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background2}
label-active-foreground = ${colors.foreground-active}
label-active-underline = ${colors.accent}
label-active-padding = 2

label-occupied = %name%
label-occupied-background = ${colors.background}
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 2

label-urgent = %name%
label-urgent-background = ${colors.accent}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 2

label-empty = %name%
label-empty-background = ${colors.background}
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
label-foreground = ${colors.foreground-active}

[module/network]
type = internal/network
interface-type = wireless
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-connected = ï‡«  %essid%
label-connected-foreground = ${colors.accent}
label-disconnected = َ°–ھ 
label-disconnected-foreground = ${colors.disabled}

[module/disk]
type = internal/fs
mount-0 = /
interval = 30
label-mounted = َ°‹ٹ %percentage_used%%
label-mounted-foreground = ${colors.accent}

# --- NUEVOS Mأ“DULOS DE RECURSOS ---
[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "ï’¼ "
format-prefix-foreground = ${colors.accent}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "î؟…  "
format-prefix-foreground = ${colors.accent}
label = %percentage_used:2%%

# --- Mأ“DULO DE VOLUMEN CON DEGRADADO ---
[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false

format-volume = <ramp-volume> <bar-volume>
label-muted = َ°–پ Muted
label-muted-foreground = ${colors.disabled}

ramp-volume-0 = َ°•؟
ramp-volume-1 = َ°–€
ramp-volume-2 = َ°•¾
ramp-volume-foreground = ${colors.accent}

bar-volume-width = 10
bar-volume-gradient = true
bar-volume-indicator = ï„‘
bar-volume-indicator-foreground = ${colors.foreground}
bar-volume-fill = â”پ
bar-volume-foreground-0 = #394260
bar-volume-foreground-1 = #769ff0
bar-volume-foreground-2 = #a3aed2
bar-volume-foreground-3 = #c0c8e6
bar-volume-foreground-4 = #e3e5e5
bar-volume-empty = â”پ
bar-volume-empty-foreground = ${colors.disabled}

[module/battery]
type = internal/battery
full-at = 99
low-at = 10
battery = BAT0
adapter = ADP1
poll-interval = 5
time-format = %H:%M

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
label-charging = %percentage%%
label-discharging = %percentage%%
label-full = َ°پ¹ 100%
label-full-foreground = ${colors.accent}
label-low = َ°‚ƒ LOW
label-low-foreground = #ff7eb6

ramp-capacity-0 = َ°پ؛
ramp-capacity-1 = َ°پ¼
ramp-capacity-2 = َ°پ¾
ramp-capacity-3 = َ°‚€
ramp-capacity-4 = َ°پ¹
ramp-capacity-foreground = ${colors.accent}

animation-charging-0 = َ°¢œ
animation-charging-1 = َ°‚†
animation-charging-2 = َ°‚ˆ
animation-charging-3 = َ°‚ٹ
animation-charging-4 = َ°‚…
animation-charging-foreground = ${colors.accent}
animation-charging-framerate = 750

[module/clock]
type = internal/date
interval = 1
date = ïگ؛ %H:%M
date-alt = َ°ƒ­ %Y-%m-%d
label = %date%
label-foreground = ${colors.foreground-active}
