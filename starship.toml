"$schema" = 'https://starship.rs/config-schema.json'

format = """
[в–‘в–’в–“](#a3aed2)\
[ оҹҷ ](bg:#a3aed2 fg:#090c0c)\
[оӮҙ](bg:#769ff0 fg:#a3aed2)\
$directory\
[оӮҙ](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[оӮҙ](fg:#394260 bg:#212736)\
$c\
$cpp\
$lua\
$tex\
[оӮҙ](fg:#212736 bg:#1d2230)\
$time\
[оӮҙ ](fg:#1d2230)\
\n$character"""

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[git_branch]
symbol = "пҗҳ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

# ConfiguraciГіn para C
[c]
symbol = "оҳһ "
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

# ConfiguraciГіn para C++
[cpp]
symbol = "оҳқ "
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

# ConfiguraciГіn para Neovim (usando el mГіdulo lua, ya que nvim depende de lua)
[lua]
symbol = "оҳ  "
style = "bg:#212736"
format = '[[ nvim ($version) ](fg:#769ff0 bg:#212736)]($style)'

# ConfiguraciГіn para LaTeX
[tex]
symbol = "у°”« "
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:#1d2230"
format = '[[ пҗә $time ](fg:#a0a9cb bg:#1d2230)]($style)'
